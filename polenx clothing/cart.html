<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
        }

        body {
            background: #f1f3f6;
            padding: 12px;
        }

        .header {
            background: #2874f0;
            color: white;
            padding: 14px;
            border-radius: 10px;
            text-align: center;
            font-size: 22px;
            font-weight: 600;
        }

        #cart {
            max-width: 900px;
            margin: 15px auto;
        }

        .cart-item {
            background: white;
            display: flex;
            gap: 15px;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 12px;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
        }

        .cart-item img {
            width: 110px;
            border-radius: 10px;
            object-fit: cover;
        }

        .cart-details {
            flex: 1;
        }

        .cart-details h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .price {
            color: #388e3c;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .qty-box {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .continue {
            display: block;
            max-width: 1450px;
            margin: 10px auto 15px;
            color: #2874f0;
            font-weight: 600;
            text-decoration: none;
        }

        .qty-box button {
            width: 30px;
            height: 30px;
            border-radius: 6px;
            border: 1px solid #ddd;
            background: white;
            font-size: 18px;
            cursor: pointer;
        }

        .remove-btn {
            margin-top: 10px;
            background: none;
            border: none;
            color: #ff3f6c;
            font-weight: 600;
            cursor: pointer;
        }

        .total {
            max-width: 900px;
            margin: 15px auto;
            background: white;
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 18px;
            font-weight: 700;
        }

        .checkout {
            background: #fb641b;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .checkout:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        @media(max-width:600px) {
            .cart-item {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .cart-item img {
                width: 160px;
            }

            .total {
                flex-direction: column;
                gap: 12px;
            }

            .checkout {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <a href="Polenx.html" class="continue">⬅ Continue Shopping</a>


    <div class="header">🛒 My Cart</div>

    <div id="cart"></div>

    <div class="total" id="total">
        <span>Total: ₹0</span>
        <button class="checkout" id="checkoutBtn" onclick="goCheckout()">Place Order</button>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        const cartDiv = document.getElementById("cart");
        const totalDiv = document.getElementById("total");
        const checkoutBtn = document.getElementById("checkoutBtn");

        function renderCart() {
            cartDiv.innerHTML = "";
            let total = 0;

            if (cart.length === 0) {
                cartDiv.innerHTML = "<p style='text-align:center;color:#777'>Your cart is empty</p>";
                totalDiv.style.display = "none";
                checkoutBtn.disabled = true;
                return;
            }

            totalDiv.style.display = "flex";
            checkoutBtn.disabled = false;

            cart.forEach((item, index) => {
                total += item.price * item.qty;

                cartDiv.innerHTML += `
                <div class="cart-item">
                    <img src="${item.image}">
                    <div class="cart-details">
                        <h3>${item.name}</h3>
                        <div class="price">₹${item.price}</div>

                        <div class="qty-box">
                            <button onclick="updateQty(${index},-1)">−</button>
                            <span>${item.qty}</span>
                            <button onclick="updateQty(${index},1)">+</button>
                        </div>

                        <button class="remove-btn" onclick="removeItem(${index})">Remove</button>
                    </div>
                </div>
                `;
            });

            totalDiv.children[0].innerText = `Total: ₹${total}`;
        }

        function updateQty(index, change) {
            cart[index].qty += change;
            if (cart[index].qty < 1) cart[index].qty = 1;
            localStorage.setItem("cart", JSON.stringify(cart));
            renderCart();
        }

        function removeItem(index) {
            cart.splice(index, 1);
            localStorage.setItem("cart", JSON.stringify(cart));
            renderCart();
        }

        function goCheckout() {
            window.location.href = "checkout.html"; // payment page
        }

        renderCart();
    </script>

</body>
</html>
