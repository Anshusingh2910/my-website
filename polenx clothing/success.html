<!DOCTYPE html>
<html>
<head>
<title>Order Success - Polenx</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#0f0f0f;
    font-family:Arial;
    color:white;
}
.box{
    background:#111;
    padding:35px;
    border-radius:16px;
    width:360px;
    text-align:center;
    box-shadow:0 0 20px rgba(25,219,25,0.4);
}
h2{color:#19db19;}
.details{
    background:#0b0b0b;
    padding:15px;
    border-radius:10px;
    text-align:left;
    margin:20px 0;
    font-size:14px;
}
button{
    width:100%;
    padding:12px;
    background:#19db19;
    border:none;
    border-radius:8px;
    font-weight:700;
}
</style>
</head>

<body>

<div class="box">
    <h2>Order Successful 🎉</h2>
    <p>Thanks for shopping with <b>Polenx</b></p>

    <div class="details">
        <p><b>Name:</b> <span id="n"></span></p>
        <p><b>Phone:</b> <span id="p"></span></p>
        <p><b>Address:</b> <span id="a"></span></p>
        <p><b>Payment:</b> <span id="pay"></span></p>
    </div>

    <button onclick="goHome()">Continue Shopping</button>
</div>

<script>
const order = JSON.parse(localStorage.getItem("polenxOrder"));

if(order){
    document.getElementById("n").innerText = order.name;
    document.getElementById("p").innerText = order.phone;
    document.getElementById("a").innerText = order.address;
    document.getElementById("pay").innerText = order.payment;
}else{
    alert("No order data found");
}

function goHome(){
    localStorage.removeItem("polenxOrder");
    window.location.href="polenx.html";
}
</script>


</body>
</html>
