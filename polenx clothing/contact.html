<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us - Polenx</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            min-height: 100vh;
            background: linear-gradient(135deg, #000000, #0f2d0f);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .form{
            width: 420px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            box-shadow: 0 0 25px rgba(25, 219, 25, 0.35);
            text-align: center;
        }

        h2{
            font-size: 42px;
            color: white;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .Us{
            color: #19db19;
        }

        input, textarea{
            width: 100%;
            margin-bottom: 18px;
            padding: 12px 14px;
            font-size: 16px;
            border-radius: 10px;
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.85);
        }

        textarea{
            resize: none;
            height: 90px;
        }

        input:focus, textarea:focus{
            box-shadow: 0 0 8px #19db19;
        }

        button{
            width: 120px;
            height: 42px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background: #19db19;
            color: black;
            transition: all 0.3s ease;
        }

        button:hover{
            background: white;
            box-shadow: 0 0 12px #19db19;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>

    <form class="form">
        <h2>Contact <span class="Us">Us</span></h2>

        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <textarea placeholder="Your Message"></textarea>

        <button type="submit">Send</button>
    </form>

</body>
</html>
