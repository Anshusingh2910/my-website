<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Calculator</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#111;
            color:#fff;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }
        .calculator{
            background:#222;
            padding:20px;
            border-radius:10px;
            width:280px;
            text-align:center;
        }
        input{
            width:90%;
            padding:10px;
            margin:8px 0;
            font-size:16px;
            border-radius:5px;
            border:none;
        }
        button{
            padding:10px 15px;
            margin:5px;
            font-size:16px;
            border:none;
            border-radius:5px;
            cursor:pointer;
            background:#19db19;
            color:#000;
        }
        .result{
            margin-top:15px;
            font-size:18px;
            color:#19db19;
        }
    </style>
</head>
<body>

<div class="calculator">
    <h2>Calculator</h2>

    <input type="number" id="num1" placeholder="Enter number 1">
    <input type="number" id="num2" placeholder="Enter number 2">

    <div>
        <button onclick="calculate('+')">+</button>
        <button onclick="calculate('-')">-</button>
        <button onclick="calculate('*')">*</button>
        <button onclick="calculate('/')">/</button>
    </div>

    <div class="result" id="result">Result: </div>
</div>

<script>
    function calculate(operator){
        let n1 = Number(document.getElementById("num1").value);
        let n2 = Number(document.getElementById("num2").value);
        let res;

        if(operator === "+"){
            res = n1 + n2;
        } 
        else if(operator === "-"){
            res = n1 - n2;
        } 
        else if(operator === "*"){
            res = n1 * n2;
        } 
        else if(operator === "/"){
            if(n2 === 0){
                res = "Cannot divide by 0";
            } else {
                res = n1 / n2;
            }
        }

        document.getElementById("result").innerText = "Result: " + res;
    }
</script>

</body>
</html>
