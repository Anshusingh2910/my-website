<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Checkout - Polenx Clothing</title>

<style>
*{box-sizing:border-box;}
body{
    margin:0;
    background:#f1f3f6;
    font-family:"Segoe UI", Arial;
}
.header{
    background:linear-gradient(90deg,#2874f0,#1a5fd0);
    color:white;
    padding:16px;
    text-align:center;
    font-size:20px;
    font-weight:700;
}
.box{
    width:400px;
    max-width:92%;
    margin:25px auto;
    background:#fff;
    border-radius:14px;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
    overflow:hidden;
}
.step{
    display:flex;
    align-items:center;
    gap:10px;
    padding:16px;
    font-weight:700;
    border-bottom:1px solid #eee;
    background:#fafafa;
}
.step span{
    width:26px;
    height:26px;
    border-radius:50%;
    background:#2874f0;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
}
.content{padding:18px;display:none;}
.content.active{display:block;}

input, textarea{
    width:100%;
    padding:12px;
    margin-bottom:12px;
    border-radius:6px;
    border:1px solid #ddd;
}
textarea{height:70px;resize:none;}

.payment-option{
    border:1px solid #ddd;
    border-radius:10px;
    padding:14px;
    margin-bottom:12px;
}
.upi-box{display:none;margin-top:10px;}

button{
    width:100%;
    height:48px;
    background:#fb641b;
    border:none;
    border-radius:10px;
    font-size:16px;
    font-weight:700;
    color:white;
    cursor:pointer;
}
.trust{
    text-align:center;
    font-size:12px;
    color:#777;
    margin-top:12px;
}
</style>
</head>

<body>

<div class="header">Polenx Clothing</div>

<div class="box">

<!-- STEP 1 -->
<div class="step"><span>1</span> Delivery Address</div>
<div class="content active" id="step1">
    <input id="name" placeholder="Full Name">
    <input id="phone" placeholder="Mobile Number">
    <textarea id="address" placeholder="House no, Street, City"></textarea>
    <button onclick="goStep2()">CONTINUE</button>
</div>

<!-- STEP 2 -->
<div class="step"><span>2</span> Payment Method</div>
<div class="content" id="step2">

    <div class="payment-option">
        <label>
            <input type="radio" name="pay" value="Cash on Delivery" checked onclick="hideUPI()">
            Cash on Delivery
        </label>
    </div>

    <div class="payment-option">
        <label>
            <input type="radio" name="pay" value="UPI" onclick="showUPI()">
            UPI
        </label>
        <div class="upi-box" id="upiBox">
            <input id="upiId" placeholder="Enter UPI ID">
        </div>
    </div>

    <div class="payment-option">
        <label>
            <input type="radio" name="pay" value="Card" onclick="hideUPI()">
            Card
        </label>
    </div>

    <button onclick="placeOrder()">PLACE ORDER</button>
    <div class="trust">🔒 100% Secure Payments</div>
</div>

</div>

<script>
function goStep2(){
    if(name.value==""||phone.value==""||address.value==""){
        alert("Fill all details");
        return;
    }
    step1.classList.remove("active");
    step2.classList.add("active");
}

function showUPI(){ upiBox.style.display="block"; }
function hideUPI(){ upiBox.style.display="none"; }

function placeOrder(){
    let payment=document.querySelector('input[name="pay"]:checked').value;
    let upi=upiId.value;

    if(payment=="UPI" && upi==""){
        alert("Enter UPI ID");
        return;
    }

    let order={
        name:name.value,
        phone:phone.value,
        address:address.value,
        payment:payment,
        upi:upi
    };

    localStorage.setItem("polenxOrder",JSON.stringify(order));
    window.location.href="success.html";
}
</script>

</body>
</html>
